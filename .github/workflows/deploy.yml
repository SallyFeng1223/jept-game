name: Deploy React Game to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (使用官方穩定版)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (精準安裝依賴)
        run: |
          npm install
          npm install tailwindcss@3 postcss autoprefixer

      - name: Build project
        run: npm run build

      - name: Verify dist folder (自動除錯檢查點)
        run: |
          echo "==== 檢查打包結果 ===="
          ls -la dist || exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
