name: Deploy React Game to GitHub Pages

on:
  push:
    branches: ['main'] # 當 main 分支有更新時自動觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # 依據 GitHub 官方政策，提前強制套件使用 Node.js 24 執行環境
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auto-fix Directory (防呆：解決上傳資料夾包覆問題)
        run: |
          if [ ! -f "package.json" ]; then
            echo "找不到 package.json，開始自動搜尋子目錄並修復結構..."
            SUB_DIR=$(find . -mindepth 1 -maxdepth 2 -name "package.json" -exec dirname {} \; | head -n 1)
            if [ -n "$SUB_DIR" ]; then
              echo "在 $SUB_DIR 找到專案檔案，正在將檔案移至最外層..."
              shopt -s dotglob
              mv "$SUB_DIR"/* .
              rm -rf "$SUB_DIR"
            else
              echo "警告：未找到專案檔案！"
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 升級至官方最新支援的 Node.js 24

      - name: Install dependencies (Failsafe 防呆安裝)
        run: |
          npm install --no-audit --no-fund || true
          npm install firebase lucide-react tailwindcss@3 postcss autoprefixer vite @vitejs/plugin-react
      - name: Build project
        run: npm run build || npx vite build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
