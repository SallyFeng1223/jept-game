name: Deploy React Game to GitHub Pages

on:
  push:
    branches: ['main'] # 當 main 分支有更新時自動觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies (Failsafe 防呆安裝)
        run: |
          npm install
          npm install firebase lucide-react tailwindcss postcss autoprefixer vite @vitejs/plugin-react
      - name: Build project
        run: npm run build || npx vite build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
